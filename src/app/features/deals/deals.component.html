<div class="flex flex-col h-screen">

  <!-- Header -->
  <header class="flex items-center justify-between px-6 h-16 bg-[#0f1623] shrink-0">
    <span class="text-teal-400 font-bold text-xl tracking-wide">TermSheet</span>
    <button mat-icon-button [matMenuTriggerFor]="profileMenu" aria-label="Profile menu" class="!p-1.5">
      <mat-icon class="text-pink-400 !text-3xl !w-8 !h-8">account_circle</mat-icon>
    </button>
    <mat-menu #profileMenu="matMenu">
      <button mat-menu-item (click)="onLogout()">
        <mat-icon>logout</mat-icon>
        <span>Log out</span>
      </button>
    </mat-menu>
  </header>

  <!-- Subheader -->
  <div class="flex items-center justify-between px-6 py-3 border-b border-gray-200 bg-neutral-100 shrink-0 gap-4">
    <h1 class="text-xl font-semibold text-gray-900 shrink-0">Deals</h1>

    <div class="flex items-center gap-3 ml-auto">
      <!-- Name search -->
      <mat-form-field appearance="outline" class="w-52" subscriptSizing="dynamic">
        <input matInput [formControl]="nameFilter" placeholder="Search by name" />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <!-- Price filter -->
      <button mat-stroked-button [matMenuTriggerFor]="filterMenu" class="h-10">
        <mat-icon>filter_list</mat-icon>
        Filter
      </button>
      <mat-menu #filterMenu="matMenu">
        <div class="px-4 py-3 flex flex-col gap-3 w-64" (click)="$event.stopPropagation()">
          <p class="text-sm font-medium text-gray-700">Filter by Purchase Price</p>
          <form [formGroup]="priceForm" class="flex flex-col gap-3">
            <mat-form-field appearance="outline" subscriptSizing="dynamic" floatLabel="always">
              <mat-label>Price ($)</mat-label>
              <input matInput type="number" step="0.01" formControlName="value" placeholder="0.00" min="0" />
            </mat-form-field>
            <mat-form-field appearance="outline" subscriptSizing="dynamic" floatLabel="always">
              <mat-label>Condition</mat-label>
              <mat-select formControlName="operator">
                <mat-option value="gt">Greater than</mat-option>
                <mat-option value="lt">Less than</mat-option>
              </mat-select>
            </mat-form-field>
            <button mat-flat-button color="primary" type="button" (click)="onSetPriceFilter()">
              Apply
            </button>
          </form>
        </div>
      </mat-menu>

      <!-- Reset -->
      <button mat-stroked-button class="h-10" (click)="onResetFilters()">
        Reset
      </button>

      <!-- New Deal -->
      <button mat-flat-button color="primary" class="h-10">
        <mat-icon>add</mat-icon>
        New Deal
      </button>
    </div>
  </div>

  <!-- Table area -->
  <div class="flex-1 overflow-auto bg-gray-50">
    <mat-table [dataSource]="(deals$ | async) ?? []" class="w-full shadow-sm rounded-lg">

      <ng-container matColumnDef="name">
        <mat-header-cell *matHeaderCellDef class="font-semibold text-gray-600">Deal Name</mat-header-cell>
        <mat-cell *matCellDef="let deal" class="font-medium text-gray-900">{{ deal.name }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="purchasePrice">
        <mat-header-cell *matHeaderCellDef class="font-semibold text-gray-600">Purchase Price ($)</mat-header-cell>
        <mat-cell *matCellDef="let deal">{{ deal.purchasePrice | number }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="address">
        <mat-header-cell *matHeaderCellDef class="font-semibold text-gray-600">Address</mat-header-cell>
        <mat-cell *matCellDef="let deal">{{ deal.address }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="noi">
        <mat-header-cell *matHeaderCellDef class="font-semibold text-gray-600">NOI ($)</mat-header-cell>
        <mat-cell *matCellDef="let deal">{{ deal.noi | number }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="capRate">
        <mat-header-cell *matHeaderCellDef class="font-semibold text-gray-600">Cap Rate (%)</mat-header-cell>
        <mat-cell *matCellDef="let deal">{{ deal.capRate | number:'1.2-2' }}%</mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="displayedColumns" class="bg-gray-100"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-gray-50 transition-colors"></mat-row>

    </mat-table>
  </div>

</div>
