
<div class="h-screen w-full flex">
    <div class="w-5/12 h-full flex justify-end items-center px-8">
        <div class="w-80 mx-8">
            <div class="text-3xl font-bold mb-8">Sign In</div>

            @if (submitted && authForm.invalid) {
                <p class="text-red-500 text-sm mt-2">Invalid credentials</p>
            }

            <form [formGroup]="authForm" (ngSubmit)="onSignIn()">
                <div class="flex flex-col gap-2 mt-4">
                    <label for="email">Email Address</label>
                    <input
                        type="text"
                        name="email"
                        id="email"
                        formControlName="email"
                        class="w-full h-10 rounded-md border px-2"
                        [class.border-red-500]="submitted && authForm.get('email')?.invalid"
                        [class.border-gray-400]="!(submitted && authForm.get('email')?.invalid)"
                    >
                </div>

                @if (showPasswordStep) {
                    <div class="flex flex-col gap-2 mt-4">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            name="password"
                            id="password"
                            formControlName="password"
                            class="w-full h-10 rounded-md border px-2"
                            [class.border-red-500]="submitted && authForm.get('password')?.invalid"
                            [class.border-gray-400]="!(submitted && authForm.get('password')?.invalid)"
                        >
                    </div>
                    <button type="submit" class="w-full h-10 bg-blue-500 text-white rounded-md mt-4">Sign In</button>
                    <button type="button" (click)="onBack()" class="h-8 bg-transparent text-black rounded-md mt-4 border border-gray-200 px-8 w-full">Back</button>
                }

                @if (!showPasswordStep) {
                    <button type="button" (click)="onNext()" class="w-full h-10 bg-blue-500 text-white rounded-md mt-4">Next</button>
                }
            </form>
        </div>
    </div>
    <div class="w-7/12 bg-gray-700 h-full flex justify-center items-center">
        <div class="w-4/5 max-w-md">
            <h2 class="text-[40px] font-bold font-[Segoe UI] text-white">We make real estate
investors better.</h2>
            <p class="font-[Segoe UI] text-white opacity-70">
                TermSheet is a real estate workflow platform that brings your deals and data into a single location across both web and mobile.
            </p>
            
            <button class="h-8 bg-transparent text-white rounded-md mt-8 border border-white px-12">Learn More</button>
        </div>
    </div>
</div>
