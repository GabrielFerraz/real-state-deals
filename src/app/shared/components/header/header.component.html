<header class="flex items-center justify-between px-6 h-16 bg-[#0f1623] shrink-0">
  <div class="flex items-center gap-3">
    <img src="assets/images/logo.svg" alt="TermSheet Logo" class="h-8 w-8" />
    <span class="text-white font-bold text-xl tracking-wide">TermSheet</span>
  </div>
  <button mat-icon-button [matMenuTriggerFor]="profileMenu" aria-label="Profile menu" class="!p-1.5">
    <mat-icon class="text-pink-400 !text-3xl !w-8 !h-8">account_circle</mat-icon>
  </button>
  <mat-menu #profileMenu="matMenu">
    <button mat-menu-item (click)="onLogout()">
      <mat-icon>logout</mat-icon>
      <span>Log out</span>
    </button>
  </mat-menu>
</header>
